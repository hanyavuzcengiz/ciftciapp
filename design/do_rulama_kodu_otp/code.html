<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#a5f86b",
                    "tertiary-container": "#2b79b7",
                    "primary-fixed": "#ffdbd2",
                    "surface-container-low": "#f0f3ff",
                    "primary-fixed-dim": "#ffb4a2",
                    "on-secondary-fixed-variant": "#245100",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#f9f9ff",
                    "on-secondary-fixed": "#0a2000",
                    "secondary-container": "#a2f569",
                    "on-secondary-container": "#347000",
                    "tertiary-fixed-dim": "#99cbff",
                    "outline": "#8f7068",
                    "on-primary-fixed-variant": "#891e00",
                    "on-tertiary-fixed-variant": "#004a78",
                    "tertiary": "#00609a",
                    "outline-variant": "#e4beb5",
                    "inverse-surface": "#21314a",
                    "on-tertiary-fixed": "#001d34",
                    "surface-tint": "#b32a00",
                    "on-background": "#0b1b34",
                    "surface-container": "#e8eeff",
                    "error": "#ba1a1a",
                    "on-tertiary-container": "#fdfcff",
                    "on-surface-variant": "#5b403a",
                    "on-surface": "#0b1b34",
                    "on-error": "#ffffff",
                    "tertiary-fixed": "#cfe5ff",
                    "on-error-container": "#93000a",
                    "on-primary-container": "#fffbff",
                    "surface": "#f9f9ff",
                    "error-container": "#ffdad6",
                    "primary": "#af2900",
                    "surface-container-high": "#dfe8ff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#d6e3ff",
                    "on-primary": "#ffffff",
                    "surface-variant": "#d6e3ff",
                    "on-primary-fixed": "#3c0800",
                    "background": "#f9f9ff",
                    "secondary-fixed-dim": "#8adb52",
                    "inverse-primary": "#ffb4a2",
                    "surface-dim": "#cbdafc",
                    "on-tertiary": "#ffffff",
                    "inverse-on-surface": "#ecf0ff",
                    "primary-container": "#d63c10",
                    "secondary": "#316b00"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Work Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-input-shadow {
            box-shadow: 0 2px 8px rgba(11, 27, 52, 0.04);
        }
        .keypad-button:active {
            transform: scale(0.92);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#f9f9ff] dark:bg-[#0b1b34] flex items-center justify-between px-6 h-16 w-full">
<button class="flex items-center justify-center w-10 h-10 hover:opacity-80 transition-opacity active:scale-95 active:duration-150">
<span class="material-symbols-outlined text-[#af2900] dark:text-[#f04e23] text-2xl">arrow_back</span>
</button>
<h1 class="font-['Work_Sans'] font-semibold text-lg text-[#0b1b34] dark:text-[#f9f9ff]">Verification</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 flex flex-col px-6 pt-10 pb-8 max-w-md mx-auto w-full">
<!-- Editorial Header Section -->
<div class="space-y-4 mb-12">
<h2 class="font-headline text-4xl font-bold tracking-tight text-on-background">
                Doğrulama Kodu
            </h2>
<p class="text-on-surface-variant font-body leading-relaxed">
                Lütfen <span class="font-semibold text-on-background">+90 5** *** ** 42</span> numaralı telefonunuza gönderilen <span class="font-semibold text-on-background">6 haneli</span> kodu giriniz.
            </p>
</div>
<!-- OTP Inputs Grid -->
<div class="grid grid-cols-6 gap-3 mb-10">
<input class="w-full aspect-square text-center text-2xl font-bold bg-surface-container-high text-on-background border-none rounded-xl focus:ring-2 focus:ring-primary otp-input-shadow" maxlength="1" placeholder="-" readonly="" type="text"/>
<input class="w-full aspect-square text-center text-2xl font-bold bg-surface-container-high text-on-background border-none rounded-xl focus:ring-2 focus:ring-primary otp-input-shadow" maxlength="1" placeholder="-" readonly="" type="text"/>
<input class="w-full aspect-square text-center text-2xl font-bold bg-surface-container-high text-on-background border-none rounded-xl focus:ring-2 focus:ring-primary otp-input-shadow" maxlength="1" placeholder="-" readonly="" type="text"/>
<input class="w-full aspect-square text-center text-2xl font-bold bg-surface-container-high text-on-background border-none rounded-xl focus:ring-2 focus:ring-primary otp-input-shadow" maxlength="1" placeholder="-" readonly="" type="text"/>
<input class="w-full aspect-square text-center text-2xl font-bold bg-surface-container-high text-on-background border-none rounded-xl focus:ring-2 focus:ring-primary otp-input-shadow" maxlength="1" placeholder="-" readonly="" type="text"/>
<input class="w-full aspect-square text-center text-2xl font-bold bg-surface-container-high text-on-background border-none rounded-xl focus:ring-2 focus:ring-primary otp-input-shadow" maxlength="1" placeholder="-" readonly="" type="text"/>
</div>
<!-- Timer & Resend Section -->
<div class="flex flex-col items-center gap-2 mb-12">
<div class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-low text-tertiary">
<span class="material-symbols-outlined text-sm">schedule</span>
<span class="font-mono font-semibold tracking-wider">01:59</span>
</div>
<button class="text-sm font-semibold text-on-surface-variant hover:text-primary transition-colors py-2">
                Kodu tekrar gönder
            </button>
</div>
<!-- Primary Action -->
<button class="w-full h-14 rounded-xl bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg shadow-lg active:scale-[0.98] transition-transform">
            Doğrula
        </button>
<!-- Spacer for Keypad -->
<div class="mt-auto pt-10">
<!-- Custom Numeric Keypad (Implicit Context) -->
<div class="grid grid-cols-3 gap-y-4 gap-x-8">
<button class="keypad-button h-12 flex items-center justify-center text-2xl font-medium text-on-background rounded-full hover:bg-surface-container transition-all">1</button>
<button class="keypad-button h-12 flex items-center justify-center text-2xl font-medium text-on-background rounded-full hover:bg-surface-container transition-all">2</button>
<button class="keypad-button h-12 flex items-center justify-center text-2xl font-medium text-on-background rounded-full hover:bg-surface-container transition-all">3</button>
<button class="keypad-button h-12 flex items-center justify-center text-2xl font-medium text-on-background rounded-full hover:bg-surface-container transition-all">4</button>
<button class="keypad-button h-12 flex items-center justify-center text-2xl font-medium text-on-background rounded-full hover:bg-surface-container transition-all">5</button>
<button class="keypad-button h-12 flex items-center justify-center text-2xl font-medium text-on-background rounded-full hover:bg-surface-container transition-all">6</button>
<button class="keypad-button h-12 flex items-center justify-center text-2xl font-medium text-on-background rounded-full hover:bg-surface-container transition-all">7</button>
<button class="keypad-button h-12 flex items-center justify-center text-2xl font-medium text-on-background rounded-full hover:bg-surface-container transition-all">8</button>
<button class="keypad-button h-12 flex items-center justify-center text-2xl font-medium text-on-background rounded-full hover:bg-surface-container transition-all">9</button>
<div class="h-12"></div>
<button class="keypad-button h-12 flex items-center justify-center text-2xl font-medium text-on-background rounded-full hover:bg-surface-container transition-all">0</button>
<button class="keypad-button h-12 flex items-center justify-center text-on-background rounded-full hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-2xl">backspace</span>
</button>
</div>
</div>
</main>
<!-- Illustrative Footer Element -->
<div class="h-1 w-32 bg-on-surface/10 rounded-full mx-auto mb-2 opacity-50"></div>
</body></html>
