name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.1.0 --activate
          pnpm --version
      - run: pnpm install
      - name: Lint, typecheck, test, build, smoke list validation
        run: pnpm verify
